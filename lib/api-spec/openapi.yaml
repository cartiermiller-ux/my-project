openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Digital card store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: categories
    description: Product categories
  - name: products
    description: Products
  - name: cards
    description: Card inventory
  - name: orders
    description: Orders
  - name: users
    description: User management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Admin - Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Admin - Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Admin - Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products (with optional filters)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Admin - Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Admin - Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Admin - Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Cards (inventory)
  /cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: Admin - List cards for a product
      parameters:
        - name: productId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
    post:
      operationId: createCards
      tags: [cards]
      summary: Admin - Add cards to a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardBatchInput"
      responses:
        "201":
          description: Cards added
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                required: [added]

  /cards/{id}:
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Admin - Delete a card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List current user's orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Purchase - create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created with card content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Out of stock or insufficient balance
        "401":
          description: Not authenticated

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details (card content revealed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /admin/orders:
    get:
      operationId: listAllOrders
      tags: [admin]
      summary: Admin - List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # User profile & balance
  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/balance/topup:
    post:
      operationId: topupBalance
      tags: [users]
      summary: Top up user balance (simulate payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopupInput"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Admin stats (wow endpoint)
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin - Dashboard stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: Admin - List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, email, balance, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        balance:
          type: number
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string

    TopupInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          minimum: 1

    Category:
      type: object
      required: [id, name, slug, icon, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        description:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name, slug, icon]
      properties:
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        description:
          type: string
        sortOrder:
          type: integer

    Product:
      type: object
      required: [id, name, categoryId, price, description, featured, stock, salesCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        price:
          type: number
        originalPrice:
          type: ["number", "null"]
        description:
          type: string
        imageUrl:
          type: ["string", "null"]
        featured:
          type: boolean
        stock:
          type: integer
        salesCount:
          type: integer
        region:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, categoryId, price, description]
      properties:
        name:
          type: string
        categoryId:
          type: integer
        price:
          type: number
        originalPrice:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        featured:
          type: boolean
        region:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        categoryId:
          type: integer
        price:
          type: number
        originalPrice:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        featured:
          type: boolean
        region:
          type: string

    Card:
      type: object
      required: [id, productId, content, sold, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        content:
          type: string
        sold:
          type: boolean
        createdAt:
          type: string

    CardBatchInput:
      type: object
      required: [productId, contents]
      properties:
        productId:
          type: integer
        contents:
          type: array
          items:
            type: string

    Order:
      type: object
      required: [id, productId, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        productId:
          type: integer
        productName:
          type: ["string", "null"]
        quantity:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, completed, refunded]
        cardContents:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        email:
          type: string

    AdminStats:
      type: object
      required: [totalOrders, totalRevenue, totalProducts, totalUsers, totalCards, availableCards, recentOrders]
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        totalProducts:
          type: integer
        totalUsers:
          type: integer
        totalCards:
          type: integer
        availableCards:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
